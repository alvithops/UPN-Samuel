<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Aplikasi Monitoring Target Penjualan Harian untuk UMKM">
    <title>Dashboard Penjualan Harian | UMKM Monitor</title>
    <style>
        /* Reset and Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-color: #6366f1;
    --primary-dark: #4f46e5;
    --success-color: #10b981;
    --warning-color: #f59e0b;
    --danger-color: #ef4444;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-600: #6b7280;
    --gray-800: #1f2937;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    --radius: 12px;
}

body {
    font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: var(--gray-800);
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

/* Header Styles */
.header {
    text-align: center;
    margin-bottom: 30px;
    animation: fadeInDown 0.6s ease;
}

.header-content {
    background: rgba(255, 255, 255, 0.95);
    border-radius: var(--radius);
    padding: 30px;
    box-shadow: var(--shadow-lg);
}

.header h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    color: var(--gray-800);
}

.header p {
    color: var(--gray-600);
    font-size: 1rem;
}

/* Card Styles */
.card {
    background: white;
    border-radius: var(--radius);
    padding: 25px;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
}

/* Form Styles */
.form-section {
    margin-bottom: 30px;
    animation: fadeInUp 0.6s ease;
}

.form-section h2, .dashboard-header h2, .history-section h2 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.icon {
    font-size: 1.3em;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--gray-800);
}

.form-group input {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

/* Button Styles */
.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.btn-danger {
    background: var(--danger-color);
    color: white;
}

.btn-danger:hover {
    background: #dc2626;
    transform: translateY(-2px);
}

.btn-secondary {
    background: var(--gray-200);
    color: var(--gray-800);
}

.btn-secondary:hover {
    background: var(--gray-300);
}

/* Dashboard Header */
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 15px;
}

/* Products Grid */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 25px;
    margin-top: 20px;
}

/* Product Card */
.product-card {
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    transition: all 0.3s ease;
    animation: fadeIn 0.5s ease;
}

.product-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.product-header {
    background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.product-name {
    font-size: 1.25rem;
    font-weight: 700;
}

.product-actions {
    display: flex;
    gap: 8px;
}

.icon-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
    cursor: pointer;
    padding: 8px;
    border-radius: 6px;
    transition: all 0.3s ease;
    font-size: 1rem;
}

.icon-btn:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
}

.product-body {
    padding: 20px;
}

.stat-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--gray-200);
}

.stat-label {
    font-weight: 600;
    color: var(--gray-600);
}

.stat-value {
    font-weight: 700;
    color: var(--gray-800);
}

.stat-value.success {
    color: var(--success-color);
}

.stat-value.warning {
    color: var(--warning-color);
}

.stat-value.danger {
    color: var(--danger-color);
}

/* Progress Bar */
.progress-container {
    margin: 15px 0;
}

.progress-bar {
    width: 100%;
    height: 35px;
    background-color: var(--gray-200);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}

.progress-fill {
    height: 100%;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 0.9rem;
}

.progress-fill.low {
    background: linear-gradient(90deg, var(--danger-color), #f97316);
}

.progress-fill.medium {
    background: linear-gradient(90deg, var(--warning-color), #fbbf24);
}

.progress-fill.high {
    background: linear-gradient(90deg, var(--success-color), #34d399);
}

/* Status Badge */
.status-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.85rem;
}

.status-badge.red {
    background: #fee2e2;
    color: var(--danger-color);
}

.status-badge.yellow {
    background: #fef3c7;
    color: var(--warning-color);
}

.status-badge.green {
    background: #d1fae5;
    color: var(--success-color);
}

/* Add Sales Section */
.add-sales-section {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 2px solid var(--gray-200);
}

.add-sales-form {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.add-sales-input {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    font-size: 0.9rem;
}

.btn-add-sales {
    background: var(--success-color);
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-add-sales:hover {
    background: #059669;
    transform: scale(1.02);
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    background: white;
    border-radius: var(--radius);
    grid-column: 1 / -1;
}

.empty-icon {
    font-size: 4rem;
    margin-bottom: 15px;
}

.empty-state h3 {
    margin-bottom: 10px;
    color: var(--gray-800);
}

.empty-state p {
    color: var(--gray-600);
}

/* History Section */
.history-section {
    margin-top: 30px;
    animation: fadeInUp 0.8s ease;
}

.history-list {
    max-height: 300px;
    overflow-y: auto;
}

.history-item {
    padding: 12px;
    border-left: 4px solid var(--primary-color);
    background: var(--gray-100);
    margin-bottom: 10px;
    border-radius: 8px;
    animation: slideIn 0.3s ease;
}

.history-item strong {
    color: var(--primary-color);
}

.history-time {
    font-size: 0.8rem;
    color: var(--gray-600);
    margin-top: 5px;
}

.empty-history {
    text-align: center;
    padding: 30px;
    color: var(--gray-600);
}

/* Toast Notification */
.toast-notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: white;
    color: var(--gray-800);
    padding: 15px 25px;
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    transform: translateX(400px);
    transition: transform 0.3s ease;
    z-index: 1000;
    max-width: 350px;
    font-weight: 500;
}

.toast-notification.show {
    transform: translateX(0);
}

.toast-notification.success {
    border-left: 4px solid var(--success-color);
}

.toast-notification.error {
    border-left: 4px solid var(--danger-color);
}

.toast-notification.info {
    border-left: 4px solid var(--primary-color);
}

/* Animations */
@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* Responsive Design */
@media (max-width: 768px) {
    body {
        padding: 10px;
    }

    .header h1 {
        font-size: 1.5rem;
    }

    .products-grid {
        grid-template-columns: 1fr;
        gap: 15px;
    }

    .dashboard-header {
        flex-direction: column;
        align-items: stretch;
    }

    .add-sales-form {
        flex-direction: column;
    }

    .btn-add-sales {
        width: 100%;
    }

    .card {
        padding: 15px;
    }

    .product-header {
        padding: 15px;
    }
}

@media (max-width: 480px) {
    .product-name {
        font-size: 1rem;
    }

    .stat-item {
        font-size: 0.9rem;
    }

    .toast-notification {
        left: 20px;
        right: 20px;
        max-width: none;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="header-content">
                <h1>
                    <span class="icon">📊</span>
                    Monitoring Target Penjualan Harian
                </h1>
                <p>Kelola dan pantau pencapaian target penjualan barang Anda dengan mudah</p>
            </div>
        </header>

        <!-- Form Section untuk Menambah Barang -->
        <section class="form-section">
            <div class="card">
                <h2>
                    <span class="icon">➕</span>
                    Tambah Barang Baru
                </h2>
                <form id="productForm">
                    <div class="form-group">
                        <label for="productName">Nama Barang</label>
                        <input type="text" id="productName" placeholder="Contoh: Kopi Arabica" required>
                    </div>
                    <div class="form-group">
                        <label for="dailyTarget">Target Penjualan Harian (Unit)</label>
                        <input type="number" id="dailyTarget" placeholder="Contoh: 100" min="1" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span class="icon">💾</span>
                        Tambah Barang
                    </button>
                </form>
            </div>
        </section>

        <!-- Dashboard Section - Daftar Barang -->
        <section class="dashboard-section">
            <div class="dashboard-header">
                <h2>
                    <span class="icon">📦</span>
                    Daftar Barang & Monitoring
                </h2>
                <button id="resetAllBtn" class="btn btn-danger">
                    <span class="icon">🔄</span>
                    Reset Semua Penjualan
                </button>
            </div>
            <div id="productsContainer" class="products-grid">
                <!-- Product cards will be dynamically inserted here -->
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <h3>Belum Ada Barang</h3>
                    <p>Silakan tambah barang terlebih dahulu menggunakan form di atas</p>
                </div>
            </div>
        </section>

        <!-- Riwayat Penjualan Section (Opsional) -->
        <section class="history-section">
            <div class="card">
                <h2>
                    <span class="icon">📜</span>
                    Riwayat Aktivitas
                </h2>
                <div id="historyList" class="history-list">
                    <div class="empty-history">Belum ada aktivitas</div>
                </div>
                <button id="clearHistoryBtn" class="btn btn-secondary" style="margin-top: 15px;">
                    Hapus Riwayat
                </button>
            </div>
        </section>
    </div>

    <!-- Notification Toast -->
    <div id="notificationToast" class="toast-notification"></div>

    <script>
        // Data Storage Keys
const STORAGE_KEYS = {
    PRODUCTS: 'sales_products',
    HISTORY: 'sales_history'
};

// Global Data
let products = [];
let activityHistory = [];

// Initialize application
document.addEventListener('DOMContentLoaded', () => {
    loadData();
    renderProducts();
    renderHistory();
    setupEventListeners();
});

// Setup Event Listeners
function setupEventListeners() {
    // Form tambah barang
    document.getElementById('productForm').addEventListener('submit', (e) => {
        e.preventDefault();
        addNewProduct();
    });

    // Reset semua penjualan
    document.getElementById('resetAllBtn').addEventListener('click', () => {
        if (confirm('Apakah Anda yakin ingin mereset semua penjualan hari ini? Data barang akan tetap ada, tetapi total penjualan akan direset ke 0.')) {
            resetAllSales();
        }
    });

    // Hapus riwayat
    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
        if (confirm('Hapus semua riwayat aktivitas?')) {
            clearHistory();
        }
    });
}

// Add New Product
function addNewProduct() {
    const productName = document.getElementById('productName').value.trim();
    const dailyTarget = parseFloat(document.getElementById('dailyTarget').value);

    // Validasi input
    if (!productName) {
        showNotification('Nama barang tidak boleh kosong!', 'error');
        return;
    }

    if (isNaN(dailyTarget) || dailyTarget <= 0) {
        showNotification('Target penjualan harus lebih dari 0!', 'error');
        return;
    }

    // Cek apakah barang sudah ada
    if (products.some(p => p.name.toLowerCase() === productName.toLowerCase())) {
        showNotification('Barang dengan nama tersebut sudah ada!', 'error');
        return;
    }

    // Create new product
    const newProduct = {
        id: Date.now(),
        name: productName,
        target: dailyTarget,
        currentSales: 0,
        createdAt: new Date().toISOString()
    };

    products.push(newProduct);
    saveProducts();
    renderProducts();
    
    // Add to history
    addToHistory(`Menambahkan barang baru: ${productName} (Target: ${dailyTarget} unit)`, 'success');
    
    // Clear form
    document.getElementById('productForm').reset();
    
    showNotification(`Barang "${productName}" berhasil ditambahkan!`, 'success');
}

// Add Sales to Product
function addSales(productId, amount) {
    const product = products.find(p => p.id === productId);
    
    if (!product) {
        showNotification('Produk tidak ditemukan!', 'error');
        return;
    }

    // Validasi amount
    if (isNaN(amount) || amount <= 0) {
        showNotification('Jumlah penjualan harus lebih dari 0!', 'error');
        return;
    }

    const oldSales = product.currentSales;
    product.currentSales += amount;
    
    saveProducts();
    renderProducts();
    
    // Calculate percentage for history
    const percentage = ((product.currentSales / product.target) * 100).toFixed(1);
    addToHistory(`${product.name}: Menambah penjualan ${amount} unit (Total: ${product.currentSales}/${product.target} unit - ${percentage}%)`, 'info');
    
    showNotification(`Berhasil menambah penjualan ${product.name} sebanyak ${amount} unit!`, 'success');
    
    // Check if target achieved
    const oldPercentage = (oldSales / product.target) * 100;
    const newPercentage = (product.currentSales / product.target) * 100;
    
    if (oldPercentage < 100 && newPercentage >= 100) {
        showNotification(`🎉 Selamat! Target penjualan ${product.name} telah TERCAPAI! 🎉`, 'success');
        addToHistory(`✨ ${product.name} mencapai target penjualan! ✨`, 'success');
    } else if (oldPercentage < 80 && newPercentage >= 80 && newPercentage < 100) {
        showNotification(`⚡ ${product.name} hampir mencapai target! (${newPercentage}%)`, 'info');
    }
}

// Reset Single Product Sales
function resetProductSales(productId) {
    const product = products.find(p => p.id === productId);
    if (product && confirm(`Reset penjualan untuk "${product.name}"?`)) {
        product.currentSales = 0;
        saveProducts();
        renderProducts();
        addToHistory(`Reset penjualan ${product.name} ke 0`, 'warning');
        showNotification(`Penjualan ${product.name} telah direset`, 'info');
    }
}

// Reset All Sales
function resetAllSales() {
    products.forEach(product => {
        product.currentSales = 0;
    });
    saveProducts();
    renderProducts();
    addToHistory('Reset semua penjualan harian', 'warning');
    showNotification('Semua penjualan telah direset', 'info');
}

// Delete Product
function deleteProduct(productId) {
    const product = products.find(p => p.id === productId);
    if (product && confirm(`Hapus barang "${product.name}"?`)) {
        products = products.filter(p => p.id !== productId);
        saveProducts();
        renderProducts();
        addToHistory(`Menghapus barang: ${product.name}`, 'error');
        showNotification(`Barang "${product.name}" telah dihapus`, 'info');
    }
}

// Calculate Status and Percentage
function calculateStatus(currentSales, target) {
    const percentage = (currentSales / target) * 100;
    let status = '';
    let statusClass = '';
    
    if (percentage < 80) {
        status = 'Belum Tercapai';
        statusClass = 'red';
    } else if (percentage >= 80 && percentage < 100) {
        status = 'Hampir Tercapai';
        statusClass = 'yellow';
    } else {
        status = 'Target Tercapai';
        statusClass = 'green';
    }
    
    return {
        percentage: Math.min(percentage, 100).toFixed(1),
        status: status,
        statusClass: statusClass,
        progressClass: percentage < 80 ? 'low' : (percentage < 100 ? 'medium' : 'high')
    };
}

// Render Products to Dashboard
function renderProducts() {
    const container = document.getElementById('productsContainer');
    
    if (products.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <h3>Belum Ada Barang</h3>
                <p>Silakan tambah barang terlebih dahulu menggunakan form di atas</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = products.map(product => {
        const { percentage, status, statusClass, progressClass } = calculateStatus(product.currentSales, product.target);
        
        return `
            <div class="product-card" data-product-id="${product.id}">
                <div class="product-header">
                    <div class="product-name">${escapeHtml(product.name)}</div>
                    <div class="product-actions">
                        <button class="icon-btn" onclick="resetProductSales(${product.id})" title="Reset Penjualan">
                            🔄
                        </button>
                        <button class="icon-btn" onclick="deleteProduct(${product.id})" title="Hapus Barang">
                            🗑️
                        </button>
                    </div>
                </div>
                <div class="product-body">
                    <div class="stat-item">
                        <span class="stat-label">Target Harian:</span>
                        <span class="stat-value">${formatNumber(product.target)} unit</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Penjualan Hari Ini:</span>
                        <span class="stat-value ${percentage >= 100 ? 'success' : (percentage >= 80 ? 'warning' : 'danger')}">
                            ${formatNumber(product.currentSales)} unit
                        </span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Persentase:</span>
                        <span class="stat-value">${percentage}%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Status:</span>
                        <span class="status-badge ${statusClass}">${status}</span>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill ${progressClass}" style="width: ${percentage}%">
                                ${percentage}%
                            </div>
                        </div>
                    </div>
                    
                    <div class="add-sales-section">
                        <div class="stat-label" style="margin-bottom: 8px;">Tambah Penjualan:</div>
                        <div class="add-sales-form">
                            <input type="number" id="salesInput-${product.id}" class="add-sales-input" 
                                   placeholder="Jumlah unit" min="1" step="1">
                            <button class="btn-add-sales" onclick="addSalesFromInput(${product.id})">
                                + Tambah
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// Helper function to add sales from input
function addSalesFromInput(productId) {
    const input = document.getElementById(`salesInput-${productId}`);
    const amount = parseFloat(input.value);
    
    if (isNaN(amount) || amount <= 0) {
        showNotification('Masukkan jumlah penjualan yang valid (lebih dari 0)!', 'error');
        return;
    }
    
    addSales(productId, amount);
    input.value = ''; // Clear input after adding
}

// Add to History
function addToHistory(message, type = 'info') {
    const historyItem = {
        id: Date.now(),
        message: message,
        type: type,
        timestamp: new Date().toLocaleString('id-ID')
    };
    
    activityHistory.unshift(historyItem); // Add to beginning
    
    // Keep only last 50 history items
    if (activityHistory.length > 50) {
        activityHistory = activityHistory.slice(0, 50);
    }
    
    saveHistory();
    renderHistory();
}

// Render History
function renderHistory() {
    const historyContainer = document.getElementById('historyList');
    
    if (activityHistory.length === 0) {
        historyContainer.innerHTML = '<div class="empty-history">Belum ada aktivitas</div>';
        return;
    }
    
    historyContainer.innerHTML = activityHistory.map(item => `
        <div class="history-item">
            <div>
                <strong>${getHistoryIcon(item.type)}</strong> ${escapeHtml(item.message)}
            </div>
            <div class="history-time">📅 ${item.timestamp}</div>
        </div>
    `).join('');
}

// Get History Icon based on type
function getHistoryIcon(type) {
    switch(type) {
        case 'success': return '✅';
        case 'error': return '❌';
        case 'warning': return '⚠️';
        default: return '📝';
    }
}

// Clear History
function clearHistory() {
    activityHistory = [];
    saveHistory();
    renderHistory();
    showNotification('Riwayat berhasil dihapus', 'info');
}

// Show Notification Toast
function showNotification(message, type = 'info') {
    const toast = document.getElementById('notificationToast');
    toast.textContent = message;
    toast.className = `toast-notification ${type}`;
    toast.classList.add('show');
    
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

// Format Number with thousand separator
function formatNumber(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Save Products to LocalStorage
function saveProducts() {
    localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products));
}

// Save History to LocalStorage
function saveHistory() {
    localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(activityHistory));
}

// Load Data from LocalStorage
function loadData() {
    // Load products
    const storedProducts = localStorage.getItem(STORAGE_KEYS.PRODUCTS);
    if (storedProducts) {
        products = JSON.parse(storedProducts);
    } else {
        // Sample data for demonstration
        products = [
            {
                id: 1,
                name: 'Kopi Arabica',
                target: 100,
                currentSales: 75,
                createdAt: new Date().toISOString()
            },
            {
                id: 2,
                name: 'Teh Hijau',
                target: 80,
                currentSales: 82,
                createdAt: new Date().toISOString()
            },
            {
                id: 3,
                name: 'Susu Kedelai',
                target: 50,
                currentSales: 35,
                createdAt: new Date().toISOString()
            }
        ];
        saveProducts();
    }
    
    // Load history
    const storedHistory = localStorage.getItem(STORAGE_KEYS.HISTORY);
    if (storedHistory) {
        activityHistory = JSON.parse(storedHistory);
    } else {
        activityHistory = [
            {
                id: Date.now(),
                message: 'Selamat datang di Dashboard Penjualan!',
                type: 'info',
                timestamp: new Date().toLocaleString('id-ID')
            }
        ];
        saveHistory();
    }
}

// Make functions available globally for inline event handlers
window.addSalesFromInput = addSalesFromInput;
window.resetProductSales = resetProductSales;
window.deleteProduct = deleteProduct;
    </script>
